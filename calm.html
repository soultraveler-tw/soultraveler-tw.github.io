<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🜁 靜域之心｜靈魂旅人 Soul Traveler</title>
    <style>
        :root { 
            --bg-color: #050A14; 
            --text-main: #EAEAEA; 
            --text-muted: #888899; 
            --gold-accent: #DCA750; 
            --border-color: #1E3050; 
            --nav-bg: rgba(5, 10, 20, 0.9); 
            --theme-color: #64B5F6; 
            --ease-out-cubic: cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        html { scroll-behavior: smooth; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: "PingFang TC", "Helvetica Neue", sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at 50% 0%, #0d1a33 0%, #050A14 70%); 
        }

        /* --- Navigation (同步版) --- */
        .smart-nav { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            background: var(--nav-bg); backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(220, 167, 80, 0.15); 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 40px; box-sizing: border-box; z-index: 1000; 
        }
        .smart-nav .brand-logo { color: var(--gold-accent); font-size: 1.1em; letter-spacing: 3px; font-weight: 300; text-decoration: none; }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-size: 0.9em; letter-spacing: 1px; transition: color 0.3s; }
        .nav-links a:hover { color: var(--gold-accent); }

        /* --- Hero Layout --- */
        .product-hero { 
            display: flex; min-height: 100vh; padding: 140px 40px 80px 40px; 
            box-sizing: border-box; max-width: 1200px; margin: 0 auto; gap: 80px; 
        }
        @media (max-width: 900px) { 
            .product-hero { flex-direction: column; align-items: center; text-align: center; padding: 120px 20px 40px 20px; } 
        }

        .product-visual { 
            flex: 1.2; position: sticky; top: 140px; height: fit-content; 
            aspect-ratio: 4/5; display: flex; justify-content: center; align-items: center; 
            border-radius: 24px; background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(100, 181, 246, 0.2); 
            overflow: hidden; transition: all 0.6s var(--ease-out-cubic);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 30px rgba(100, 181, 246, 0.05);
        }
        .product-visual:hover { border-color: var(--theme-color); transform: translateY(-5px); }

        .product-info { flex: 1; }
        .axis-badge { display: inline-block; padding: 6px 18px; border: 1px solid var(--theme-color); color: var(--theme-color); border-radius: 30px; font-size: 0.8em; margin-bottom: 25px; letter-spacing: 1.5px; }
        .product-title { font-size: 3em; font-weight: 300; margin: 0 0 15px 0; letter-spacing: 4px; }
        .core-quote { font-size: 1.15em; color: var(--gold-accent); margin-bottom: 35px; line-height: 1.8; font-weight: 300; }
        .energy-theme { font-size: 0.9em; color: var(--text-muted); letter-spacing: 2px; margin-bottom: 35px; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 20px; }

        /* Diagnosis Box */
        .diagnosis-box { background: rgba(100, 181, 246, 0.03); border-left: 3px solid var(--theme-color); padding: 25px; margin-bottom: 40px; text-align: left; border-radius: 0 12px 12px 0; }
        .diagnosis-box h5 { margin: 0 0 12px 0; color: var(--theme-color); font-size: 0.95em; letter-spacing: 2px; }
        .diagnosis-box p { margin: 0; font-size: 0.95em; line-height: 1.8; color: #bbb; }

        /* Usage Moments */
        .usage-moments { margin-bottom: 45px; text-align: left; }
        .usage-moments h5 { color: var(--gold-accent); font-size: 0.9em; margin-bottom: 18px; font-weight: 400; letter-spacing: 2px; }
        .moment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .moment-item { font-size: 0.85em; color: var(--text-muted); display: flex; align-items: center; gap: 10px; }
        .moment-item::before { content: ""; width: 4px; height: 4px; background: var(--gold-accent); border-radius: 50%; opacity: 0.6; }

        /* Variants */
        .variant-group { margin-bottom: 40px; text-align: left; border-top: 1px solid var(--border-color); padding-top: 35px; }
        .variants { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 20px; }
        .variant-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); padding: 12px 22px; border-radius: 10px; cursor: pointer; transition: 0.3s; font-size: 0.85em; }
        .variant-btn.active { border-color: var(--theme-color); color: var(--text-main); background: rgba(100, 181, 246, 0.1); }

        /* Details */
        .detail-section { max-width: 1000px; margin: 0 auto 120px; padding: 0 40px; }
        .detail-card { margin-bottom: 100px; }
        .detail-card h3 { color: var(--gold-accent); font-weight: 300; letter-spacing: 5px; border-bottom: 1px solid rgba(220,167,80,0.15); padding-bottom: 20px; margin-bottom: 40px; text-align: center; }
        .track-list { display: flex; flex-direction: column; gap: 30px; max-width: 750px; margin: 0 auto; }
        .track-item { display: flex; gap: 40px; align-items: flex-start; }
        .track-label { color: var(--theme-color); font-size: 0.8em; width: 90px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 3px; font-weight: bold; }

        /* Ritual */
        .ritual-section { max-width: 900px; margin: 120px auto; padding: 100px 40px; background: linear-gradient(180deg, transparent, rgba(100, 181, 246, 0.04), transparent); border-top: 1px solid rgba(100, 181, 246, 0.1); text-align: center; }
        .ritual-steps { text-align: left; max-width: 650px; margin: 60px auto 0; }
        .step-box { position: relative; padding-left: 70px; margin-bottom: 50px; }
        .step-num { position: absolute; left: 0; font-size: 2.2em; color: var(--gold-accent); opacity: 0.25; font-family: serif; font-style: italic; top: -8px; }

        footer { border-top: 1px solid var(--border-color); padding: 100px 40px; text-align: center; color: var(--text-muted); font-size: 0.8em; letter-spacing: 3px; }
    </style>
</head>

function switchVariant(v) {
    const d = variants[v];
    if(!d) return;

    document.getElementById('dynamic-need').innerText = d.need;
    document.getElementById('dynamic-theme').innerText = d.theme;
    document.getElementById('dynamic-desc').innerText = d.desc;
    document.getElementById('dynamic-diagnosis').innerHTML = d.diag;
    document.getElementById('dynamic-scene').innerHTML = d.scene;
    document.getElementById('dynamic-tracks').innerHTML = d.tracks;
    document.getElementById('dynamic-ingredients').innerText = d.ingredients;
    document.getElementById('dynamic-safety').innerText = d.safety;
    document.getElementById('ritual-title').innerText = d.ritualTitle;
    document.getElementById('ritual-intro').innerText = d.ritualIntro;
    document.getElementById('ritual-steps').innerHTML = d.ritualSteps;

    document.querySelectorAll('.variant-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-type') === v);
    });
}

document.querySelectorAll('.variant-btn').forEach(btn => {
    btn.addEventListener('click', () => switchVariant(btn.dataset.type));
});

const urlParams = new URLSearchParams(window.location.search);
switchVariant(urlParams.get('v') || 'standard');
</script>
