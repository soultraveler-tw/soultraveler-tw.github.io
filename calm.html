<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🜁 靜域之心｜靈魂旅人 Soul Traveler</title>
    <style>
        :root { 
            --bg-color: #050A14; 
            --text-main: #EAEAEA; 
            --text-muted: #888899; 
            --gold-accent: #DCA750; 
            --border-color: #1E3050; 
            --nav-bg: rgba(5, 10, 20, 0.85); 
            --theme-color: #64B5F6; 
        }
        
        body { background-color: var(--bg-color); color: var(--text-main); font-family: "PingFang TC", sans-serif; margin: 0; padding: 0; line-height: 1.6; }

        /* Navigation */
        .smart-nav { position: fixed; top: 0; width: 100%; height: 70px; background: var(--nav-bg); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(220, 167, 80, 0.15); display: flex; justify-content: space-between; align-items: center; padding: 0 40px; box-sizing: border-box; z-index: 1000; }
        .smart-nav .brand-logo { color: var(--gold-accent); font-size: 1.1em; letter-spacing: 3px; text-decoration: none; text-transform: uppercase; }

        .fade-in-element { opacity: 0; transform: translateY(40px); transition: 1.2s cubic-bezier(0.215, 0.61, 0.355, 1); }
        .fade-in-element.visible { opacity: 1; transform: translateY(0); }

        /* Hero Section */
        .product-hero { display: flex; min-height: 100vh; padding: 140px 40px 40px 40px; box-sizing: border-box; max-width: 1200px; margin: 0 auto; gap: 60px; }
        .product-visual { flex: 1; border-radius: 20px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(100, 181, 246, 0.2); display: flex; justify-content: center; align-items: center; aspect-ratio: 4/5; }
        .product-info { flex: 1; text-align: left; }

        .axis-badge { display: inline-block; padding: 6px 16px; border: 1px solid var(--theme-color); color: var(--theme-color); border-radius: 30px; font-size: 0.85em; letter-spacing: 2px; margin-bottom: 20px; }
        .product-title { font-size: 2.8em; margin: 0 0 15px 0; font-weight: 300; letter-spacing: 2px; }
        .core-quote { font-size: 1.15em; color: var(--gold-accent); margin-bottom: 25px; letter-spacing: 2px; }

        /* ✦ 適合時刻 ✦ */
        .usage-moments { font-size: 0.95em; color: #a0a0a0; margin-bottom: 30px; min-height: 1.5em; }
        .usage-moments b { color: var(--theme-color); font-weight: normal; margin-right: 8px; }

        /* 選擇配方標題 */
        .variant-label { color: var(--text-muted); font-size: 1.1em; margin-bottom: 20px; letter-spacing: 2px; }
        .variants { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 25px; }
        .variant-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 0.95em; transition: 0.3s; }
        .variant-btn.active { border-color: var(--theme-color); color: var(--text-main); background: rgba(100, 181, 246, 0.1); }

        /* 版本動態描述 (藍底) */
        .variant-content-box { background: #003399; color: #FFFFFF; padding: 15px 25px; border-radius: 4px; font-size: 1.1em; margin-bottom: 35px; letter-spacing: 1px; display: inline-block; transition: 0.3s; }

        /* 價格與按鈕 */
        .purchase-zone { display: flex; align-items: center; gap: 30px; padding: 30px 0; border-top: 1px solid rgba(255,255,255,0.1); }
        .price-tag { font-size: 1.8em; color: var(--gold-accent); font-weight: 300; }
        .buy-btn { background: var(--gold-accent); color: #000; border: none; padding: 16px 45px; font-size: 1em; letter-spacing: 2px; cursor: pointer; border-radius: 4px; font-weight: 600; }

        /* 神獸視覺框 */
        .symbol-section { max-width: 850px; margin: 100px auto; padding: 0 20px; }
        .symbol-box { border: 1px solid rgba(100, 181, 246, 0.3); background: rgba(100, 181, 246, 0.03); padding: 60px; border-radius: 4px; text-align: center; }
        .symbol-title { font-size: 1.2em; color: var(--theme-color); letter-spacing: 6px; margin-bottom: 30px; }

        /* 標題顏色 */
        .scene-title, .section-title { font-size: 1.1em; color: var(--theme-color); letter-spacing: 4px; margin-bottom: 30px; text-align: center; }
        .scene-desc { text-align: center; font-size: 1.15em; line-height: 2.2; max-width: 750px; margin: 0 auto 100px; }

        /* 香氣軌跡 */
        .resonance-section { max-width: 900px; margin: 80px auto; padding: 0 20px; }
        .track-container { border-left: 1px solid rgba(100, 181, 246, 0.3); padding-left: 35px; }
        .track-item { position: relative; margin-bottom: 50px; }
        .track-item::before { content: ''; position: absolute; left: -41px; top: 6px; width: 10px; height: 10px; background: var(--bg-color); border: 2px solid var(--theme-color); border-radius: 50%; }
        .track-level { font-size: 0.85em; color: var(--theme-color); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 2px; }

        /* 歸心儀式 */
        .ritual-section { max-width: 850px; margin: 120px auto; padding: 80px 40px; background: rgba(100, 181, 246, 0.02); border: 1px solid rgba(100, 181, 246, 0.1); text-align: center; }
        .ritual-steps { text-align: left; max-width: 600px; margin: 30px auto 0; }

        /* 成分與安全提醒 */
        .spec-container { max-width: 1000px; margin: 100px auto; padding: 0 20px; }
        .spec-item { border: 1px solid rgba(220, 167, 80, 0.2); background: rgba(255, 255, 255, 0.02); padding: 30px; margin-bottom: 20px; border-radius: 4px; text-align: center; }
        .safety-item { border: 1px solid rgba(255, 82, 82, 0.3); color: var(--text-main); }
        .alert-icon { color: #FF5252; margin-right: 10px; }

        .site-footer { border-top: 1px solid rgba(220, 167, 80, 0.15); padding: 80px 20px; text-align: center; background: #030508; }
        .footer-logo { color: var(--gold-accent); font-size: 1.5em; letter-spacing: 8px; text-decoration: none; display: block; margin-bottom: 40px; }
    </style>
</head>
<body>

<nav class="smart-nav">
    <a href="index.html" class="brand-logo">SOUL TRAVELER</a>
</nav>

<section class="product-hero fade-in-element">
    <div class="product-visual">[ 視覺影像區域 ]</div>
    <div class="product-info">
        <div class="axis-badge">適合需要：放鬆 ‧ 回到中心</div>
        <h1 class="product-title">🜁 靜域之心</h1>
        <div class="core-quote">「建立一個屬於自己的安靜空間。」</div>
        
        <div id="dynamic-moments" class="usage-moments"></div>

        <div class="variant-label">選擇專屬配方版本：</div>
        <div class="variants">
            <button class="variant-btn active" data-type="standard">標準穩心版 (無寵物)</button>
            <button class="variant-btn" data-type="pet">毛孩安心版 (有寵物)</button>
            <button class="variant-btn" data-type="baby">寶寶安睡版</button>
            <button class="variant-btn" data-type="pregnant">孕媽咪支撐版</button>
        </div>

        <div id="dynamic-content-box" class="variant-content-box"></div>

        <div class="purchase-zone">
            <div class="price-tag">NT$ 1,280</div>
            <button class="buy-btn">選擇此款香氛</button>
        </div>
    </div>
</section>

<section class="symbol-section fade-in-element">
    <div class="symbol-box">
        <div class="symbol-title">✦ 神獸象徵｜狻猊 ✦</div>
        <p class="symbol-desc">狻猊象徵安定與守護。當香氣升起，心也回到中心。</p>
    </div>
</section>

<section class="fade-in-element">
    <h3 class="scene-title">✦ 氣味場景 ✦</h3>
    <p id="dynamic-scene" class="scene-desc"></p>
</section>

<section class="resonance-section fade-in-element">
    <h2 class="section-title">✦ 香氣軌跡 ✦</h2>
    <div class="track-container" id="dynamic-tracks"></div>
</section>

<section class="ritual-section fade-in-element">
    <h2 class="section-title">✦ 狻猊歸心儀式 ✦</h2>
    <div id="dynamic-ritual" class="ritual-steps"></div>
</section>

<div class="spec-container fade-in-element">
    <div class="spec-item">
        <div style="color: var(--gold-accent); margin-bottom: 15px;">✦ 法規全成分標示 (Full Ingredients) :</div>
        <div id="dynamic-ingredients" style="font-size: 0.9em;"></div>
    </div>
    <div class="spec-item safety-item">
        <span class="alert-icon">⛔</span> <span id="dynamic-safety"></span>
    </div>
</div>

<footer class="site-footer">
    <a href="index.html" class="footer-logo">SOUL TRAVELER</a>
</footer>

<script>
    const data = {
        standard: {
            moments: "<b>✦ 適合時刻</b> 睡前冥想、深度工作前、情緒過載感到焦慮時、建立心理邊界。",
            content: "【深度冥想、思緒清理】為太容易共感的你，建立堅實的心理空間。",
            scene: "當你閉上眼睛，世界的一切喧囂瞬間被隔絕。這裡像是一座深海裡的純白房間，沒有雜訊，只有穩定的心跳聲。",
            ingredients: "佛手柑、苦橙葉、高地薰衣草、花梨木、岩蘭草、乳香、甜橙、絲柏、歐白芷根。",
            safety: "安全提醒：本配方含岩蘭草與乳香，能量較為收斂穩定。孕婦與幼兒建議選擇對應專屬版本。",
            tracks: `<div class="track-item"><div class="track-level">Top / 前調</div><div>佛手柑、苦橙葉 - 迅速冷卻過熱的思緒。</div></div><div class="track-item"><div class="track-level">Middle / 中調</div><div>高地薰衣草、花梨木 - 給予心靈溫柔的支撐。</div></div><div class="track-item"><div class="track-level">Base / 後調</div><div>岩蘭草、乳香 - 定錨意識，回到中心。</div></div>`,
            ritual: "1. 於空間噴灑後閉目。2. 想像狻猊守護在門口，擋住所有外界雜訊。3. 深吸一口氣，將重心降至丹田。"
        },
        pet: {
            moments: "<b>✦ 適合時刻</b> 與毛孩共處放鬆、寵物因環境變化緊張、搬家初期適應空間。",
            content: "【守護毛孩、平穩情緒】剔除毛孩代謝風險成分，建立跨物種的靜謐島嶼。",
            scene: "氣味與空間輕柔共振，不再有刺鼻的侵略感。你與毛孩共享這份絕對安全的平靜感。",
            ingredients: "波旁天竺葵、芫荽種子、高地薰衣草、乳香、岩蘭草、荷荷芭油、中國茉莉。",
            safety: "安全提醒：已剔除毛孩代謝困難之精油，請保持環境通風，避免對著寵物面部直接噴灑。",
            tracks: `<div class="track-item"><div class="track-level">Top / 前調</div><div>波旁天竺葵、芫荽種子 - 溫和降噪，不刺激嗅覺。</div></div><div class="track-item"><div class="track-level">Base / 後調</div><div>乳香、岩蘭草 - 長效安撫，建立安全感。</div></div>`,
            ritual: "1. 於距離寵物較遠處噴灑。2. 觀察毛孩放鬆的姿態。3. 與毛孩同步呼吸，感受能量流動。"
        },
        baby: {
            moments: "<b>✦ 適合時刻</b> 寶寶睡前儀式、環境嘈雜不安、新手父母需要放鬆時。",
            content: "【溫柔包裹、安睡守護】選用最溫和、極低劑量的植物頻率，守護純淨靈魂。",
            scene: "像是在雲朵般的搖籃裡。柔和的香氣撫平了成長中的不安與驚跳，進入深度睡眠。",
            ingredients: "羅馬洋甘菊、高地薰衣草、佛手柑（無光敏）、花梨木、乳香。",
            safety: "安全提醒：專為 6 個月以上嬰幼兒設計，濃度極低且溫和。請勿讓幼兒直接接觸噴霧噴頭。",
            tracks: `<div class="track-item"><div class="track-level">Top / 前調</div><div>羅馬洋甘菊 - 甜美的安撫，消除驚嚇。</div></div><div class="track-item"><div class="track-level">Middle / 中調</div><div>高地薰衣草 - 帶來安全與被愛的感覺。</div></div>`,
            ritual: "1. 在嬰兒房通風處少量噴灑。2. 輕聲訴說安撫語。3. 享受親子間寧靜的連結時刻。"
        },
        pregnant: {
            moments: "<b>✦ 適合時刻</b> 孕期焦慮、產前壓力、身體沉重無法安穩入眠時。",
            content: "【穩定身心、孕期支持】避開活血成分，專注於提供孕期急需的心理安定感。",
            scene: "感覺被大地溫柔承接。所有身體的沉重感都在香氣中被理解，並轉化為一股靜謐的力量。",
            ingredients: "橙花、甜橙、苦橙葉、高地薰衣草、花梨木、乳香。",
            safety: "安全提醒：避開活血與干擾荷爾蒙之成分。懷孕前三個月若有特殊體質請諮詢醫師。",
            tracks: `<div class="track-item"><div class="track-level">Top / 前調</div><div>橙花、甜橙 - 緩解孕期胸悶與焦慮。</div></div><div class="track-item"><div class="track-level">Base / 後調</div><div>乳香、花梨木 - 提供強大的情感守護力。</div></div>`,
            ritual: "1. 噴灑於身側，閉目休息。2. 雙手放置腹部，想像與孩子共享這份寧靜。3. 感受當下的平穩。"
        }
    };

    function update(type) {
        const d = data[type] || data['standard'];
        document.getElementById('dynamic-moments').innerHTML = d.moments;
        document.getElementById('dynamic-content-box').innerText = d.content;
        document.getElementById('dynamic-scene').innerText = d.scene;
        document.getElementById('dynamic-tracks').innerHTML = d.tracks;
        document.getElementById('dynamic-ingredients').innerText = d.ingredients;
        document.getElementById('dynamic-safety').innerText = d.safety;
        document.getElementById('dynamic-ritual').innerText = d.ritual;
        
        document.querySelectorAll('.variant-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.type === type);
        });
    }

    document.querySelectorAll('.variant-btn').forEach(btn => {
        btn.addEventListener('click', () => update(btn.dataset.type));
    });

    window.onload = () => {
        document.querySelectorAll('.fade-in-element').forEach(el => el.classList.add('visible'));
        update('standard'); // 預設標準版
    };
</script>
</body>
</html>
