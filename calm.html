<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🜁 靜域之心｜靈魂旅人 Soul Traveler</title>
    <style>
        :root { --bg-color: #050A14; --text-main: #EAEAEA; --text-muted: #888899; --gold-accent: #DCA750; --border-color: #1E3050; --nav-bg: rgba(5, 10, 20, 0.85); --ease-out-cubic: cubic-bezier(0.215, 0.61, 0.355, 1); --theme-color: #64B5F6; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: "PingFang TC", "Helvetica Neue", sans-serif; margin: 0; padding: 0; overflow-x: hidden; background-image: radial-gradient(circle at 50% 0%, #0d1a33 0%, #050A14 70%); }

        .smart-nav { position: fixed; top: 0; width: 100%; height: 70px; background: var(--nav-bg); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(220, 167, 80, 0.15); display: flex; justify-content: space-between; align-items: center; padding: 0 40px; box-sizing: border-box; z-index: 1000; transition: top 0.4s; }
        .smart-nav .brand-logo { color: var(--gold-accent); font-size: 1.1em; letter-spacing: 3px; font-weight: 300; text-decoration: none; }
        .smart-nav .nav-links { display: flex; gap: 30px; align-items: center; }
        .smart-nav .nav-links a { color: var(--text-main); text-decoration: none; font-size: 0.9em; letter-spacing: 1px; transition: color 0.3s; }
        .smart-nav .nav-links a:hover { color: var(--gold-accent); }

        .fade-in-element { opacity: 0; transform: translateY(40px); transition: opacity 1.2s var(--ease-out-cubic), transform 1.2s var(--ease-out-cubic); }
        .fade-in-element.visible { opacity: 1; transform: translateY(0); }

        .product-hero { display: flex; min-height: 100vh; padding: 140px 40px 40px 40px; box-sizing: border-box; max-width: 1200px; margin: 0 auto; gap: 60px; align-items: flex-start; }
        @media (max-width: 900px) { .product-hero { flex-direction: column; padding: 100px 20px 40px 20px; text-align: center; gap: 40px; align-items: center;} }

        .product-visual { flex: 1; position: relative; width: 100%; aspect-ratio: 4/5; display: flex; justify-content: center; align-items: center; border-radius: 20px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(100, 181, 246, 0.2); box-shadow: 0 0 40px rgba(100, 181, 246, 0.05); }
        .drop-zone { border: 1px dashed var(--theme-color); color: var(--theme-color); border-radius: 50%; width: 140px; height: 140px; display: flex; justify-content: center; align-items: center; cursor: pointer; text-align: center; font-size: 0.85em; letter-spacing: 1px; line-height: 1.8;}
        
        .product-info { flex: 1; }
        .axis-badge { display: inline-block; padding: 6px 16px; border: 1px solid var(--theme-color); color: var(--theme-color); border-radius: 30px; font-size: 0.8em; letter-spacing: 2px; margin-bottom: 20px; }
        .product-title { font-size: 2.5em; color: var(--text-main); margin: 0 0 15px 0; font-weight: 300; letter-spacing: 2px; }
        .core-quote { font-size: 1.15em; color: var(--gold-accent); margin-bottom: 20px; letter-spacing: 2px; line-height: 1.8; font-weight: 300;}
        .energy-theme { font-size: 0.85em; color: var(--text-muted); letter-spacing: 3px; margin-bottom: 35px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; font-weight: 300;}

        .diagnosis-box { background: rgba(255, 255, 255, 0.02); border-left: 2px solid var(--theme-color); padding: 20px; margin-bottom: 40px; }
        .diagnosis-box h5 { margin: 0 0 12px 0; color: var(--theme-color); font-size: 0.9em; letter-spacing: 2px; font-weight: 300;}
        .diagnosis-box p { margin: 0 0 15px 0; font-size: 0.95em; color: #d0d0d0; line-height: 1.8; letter-spacing: 1px;}

        .variant-group { margin-bottom: 40px; }
        .variant-title { font-size: 0.9em; color: var(--text-muted); letter-spacing: 1px; margin-bottom: 15px; font-weight: 300;}
        .variants { display: flex; gap: 12px; flex-wrap: wrap; }
        .variant-btn { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); padding: 10px 18px; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-family: inherit; font-size: 0.85em; letter-spacing: 1px;}
        .variant-btn.active { border-color: var(--theme-color); color: var(--text-main); background: rgba(100, 181, 246, 0.1); box-shadow: 0 0 10px rgba(100, 181, 246, 0.2); }
        
        .price-action { display: flex; align-items: center; gap: 30px; margin-top: 40px; padding-top: 30px; border-top: 1px solid var(--border-color); }
        .price { font-size: 1.8em; color: var(--text-main); font-weight: 300; letter-spacing: 1px; }
        .add-to-cart { background: rgba(220, 167, 80, 0.1); border: 1px solid var(--gold-accent); color: var(--gold-accent); padding: 15px 40px; border-radius: 30px; font-size: 1em; letter-spacing: 2px; cursor: pointer; transition: all 0.4s; font-weight: 300;}

        /* 動態儀式區塊 */
        .ritual-section { max-width: 800px; margin: 100px auto 80px auto; padding: 60px 40px; background: linear-gradient(180deg, rgba(5,10,20,0) 0%, rgba(100, 181, 246, 0.03) 50%, rgba(5,10,20,0) 100%); border-top: 1px solid rgba(100, 181, 246, 0.1); border-bottom: 1px solid rgba(100, 181, 246, 0.1); text-align: center; }
        .ritual-header { font-size: 0.8em; color: var(--gold-accent); letter-spacing: 6px; margin-bottom: 20px; text-transform: uppercase; }
        .ritual-title { font-size: 1.8em; color: var(--text-main); font-weight: 300; letter-spacing: 4px; margin-bottom: 30px; }
        .ritual-intro { font-size: 1em; color: var(--text-muted); line-height: 2; letter-spacing: 2px; margin-bottom: 50px; font-weight: 300; }
        .ritual-steps { display: flex; flex-direction: column; gap: 40px; text-align: left; max-width: 600px; margin: 0 auto; }
        .step-box { position: relative; padding-left: 40px; }
        .step-num { position: absolute; left: 0; top: -5px; font-size: 1.5em; color: var(--gold-accent); opacity: 0.5; font-family: serif; font-style: italic; }
        .step-title { font-size: 1.1em; color: var(--text-main); letter-spacing: 2px; margin-bottom: 10px; font-weight: 300; }
        .step-desc { font-size: 0.95em; color: #a0a0a0; line-height: 1.8; letter-spacing: 1px; font-weight: 300; }
    </style>
</head>
<body>

<nav id="smart-nav" class="smart-nav">
    <a href="index.html" class="brand-logo">SOUL TRAVELER</a>
    <div class="nav-links">
        <a href="index.html">首頁</a>
        <a href="about.html">關於品牌</a>
        <a href="philosophy.html">品牌哲學</a>
        <a href="test.html">Find Your State</a>
        <a href="state.html">狀態</a>
    </div>
</nav>

<section class="product-hero fade-in-element">
    <div class="product-visual">
        <div id="product-drop-zone" class="drop-zone">放入<br>靜域之心<br>視覺圖</div>
        <img id="product-img" class="product-img" alt="靜域之心">
    </div>

    <div class="product-info">
        <div class="axis-badge">適合需要：放鬆 ‧ 回到自己的中心 ‧ 冥想</div>
        <h1 class="product-title">🜁 靜域之心</h1>
        <div class="core-quote">
            「靜域之心不是讓世界變安靜。<br>而是在喧囂之中，建立一個屬於自己的安靜空間。」
        </div>
        
        <div class="variant-group">
            <div class="variant-title">選擇專屬配方版本：</div>
            <div class="variants">
                <button class="variant-btn active" data-type="standard">標準穩心版</button>
                <button class="variant-btn" data-type="pet">毛孩安心版</button>
                <button class="variant-btn" data-type="baby">寶寶安睡版</button>
                <button class="variant-btn" data-type="pregnant">孕媽咪支撐版</button>
            </div>
            <p id="dynamic-desc" style="font-size: 0.9em; color: var(--text-muted); margin-top: 15px; line-height: 1.8; letter-spacing: 1px; transition: opacity 0.3s ease;">
                【深度冥想、思緒清理】為太容易共感的你，建立堅實的心理空間。
            </p>
        </div>

        <div class="price-action">
            <div class="price">NT$ 9,999</div>
            <button class="add-to-cart">選擇此香氣</button>
        </div>
    </div>
</section>

<section id="dynamic-ritual" class="ritual-section fade-in-element">
    <div class="ritual-header">✦ Soul Ritual ✦</div>
    <h2 id="ritual-title" class="ritual-title">狻猊歸心儀式</h2>
    <p id="ritual-intro" class="ritual-intro">
        狻猊喜靜，是守護空間的絕對防線。<br>
        當外界過於嘈雜，你需要的不只是香氣，而是一個為你擋下所有紛擾的神聖結界。
    </p>
    <div id="ritual-steps" class="ritual-steps">
        </div>
</section>

<script>
    const variantsData = {
        standard: {
            desc: "【深度冥想、思緒清理】為太容易共感的你，建立堅實的心理空間。",
            ritualTitle: "狻猊歸心儀式",
            ritualIntro: "狻猊喜靜，是守護空間的絕對防線。當外界過於嘈雜，你需要的不只是香氣，而是一個為你擋下所有紛擾的神聖結界。",
            ritualSteps: `
                <div class="step-box"><div class="step-num">01</div><div class="step-title">落界 (The Boundary)</div><div class="step-desc">將【靜域之心】朝空間高處按壓。想像香氣落下，劃出一個安全結界。</div></div>
                <div class="step-box"><div class="step-num">02</div><div class="step-title">沉降 (The Anchor)</div><div class="step-desc">深吸氣 4 秒，感受穩定的香氣進入肺部；吐氣 8 秒，接住所有的重量。</div></div>
                <div class="step-box"><div class="step-num">03</div><div class="step-title">歸位 (Return to Center)</div><div class="step-desc">告訴自己：「我現在很安全，我可以停止戰鬥了。」安然進入深層休息。</div></div>
            `
        },
        pet: {
            desc: "【溫和頻率】調整共振頻率，安撫毛孩的焦躁，建立人寵共生的靜謐空間。",
            ritualTitle: "同頻撫慰儀式",
            ritualIntro: "當你與毛孩同時感到焦慮時，氣味是最好的橋樑。透過溫和的草本頻率，讓空間重新回歸平靜。",
            ritualSteps: `
                <div class="step-box"><div class="step-num">01</div><div class="step-title">輕柔擴散</div><div class="step-desc">在距離毛孩較遠處輕噴，讓香氣微分子自然與毛孩的磁場融合。</div></div>
                <div class="step-box"><div class="step-num">02</div><div class="step-title">溫和共鳴</div><div class="step-desc">緩慢深呼吸，與毛孩保持眼神接觸，傳遞「現在很安全」的訊號。</div></div>
                <div class="step-box"><div class="step-num">03</div><div class="step-title">靜謐連結</div><div class="step-desc">享受這種無聲但強大的陪伴，讓彼此都在氣味中獲得釋放。</div></div>
            `
        },
        baby: {
            desc: "【過濾雜訊】以極致溫和的頻率過濾環境雜訊，溫柔包覆夜間敏銳的感知。",
            ritualTitle: "星光安撫儀式",
            ritualIntro: "寶寶的夜驚往往源於對外界訊息過載，此儀式旨在創造一個溫柔的防護罩，幫助寶寶安穩入眠。",
            ritualSteps: `
                <div class="step-box"><div class="step-num">01</div><div class="step-title">氣味搖籃</div><div class="step-desc">在距離睡眠區域適當距離噴灑，讓香氣如柔軟的雲朵般覆蓋空間。</div></div>
                <div class="step-box"><div class="step-num">02</div><div class="step-title">輕柔節奏</div><div class="step-desc">輕拍寶寶背部，隨節奏緩慢吸入這份母親般的氣味懷抱。</div></div>
                <div class="step-box"><div class="step-num">03</div><div class="step-title">深層沉睡</div><div class="step-desc">讓香氣帶領寶寶進入沒有惡夢的深度沉睡。</div></div>
            `
        },
        pregnant: {
            desc: "【大地支撐】提供穩定厚實的大地能量，穩固孕期容易起伏的情緒。",
            ritualTitle: "孕期連結儀式",
            ritualIntro: "孕期需要的是「深層的支撐感」。透過這個儀式，重新感受呼吸與身體的連結。",
            ritualSteps: `
                <div class="step-box"><div class="step-num">01</div><div class="step-title">深層呼吸</div><div class="step-desc">噴灑後，專注感受香氣進入鼻腔，帶動腹部的起伏，讓呼吸順暢且深長。</div></div>
                <div class="step-box"><div class="step-num">02</div><div class="step-title">情緒安放</div><div class="step-desc">將雙手輕放在腹部，感受香氣帶來的安定，告訴自己與寶寶：「我們現在很穩固。」</div></div>
                <div class="step-box"><div class="step-num">03</div><div class="step-title">輕盈支撐</div><div class="step-desc">享受香氣帶來的腰部支撐感，讓全身肌肉隨之放鬆。</div></div>
            `
        }
    };

    function setVariant(variant) {
        if (!variantsData[variant]) return;

        // 更新按鈕
        document.querySelectorAll('.variant-btn').forEach(btn => btn.classList.remove('active'));
        const targetBtn = document.querySelector(`.variant-btn[data-type="${variant}"]`);
        if(targetBtn) targetBtn.classList.add('active');

        // 更新 UI
        const desc = document.getElementById('dynamic-desc');
        const title = document.getElementById('ritual-title');
        const intro = document.getElementById('ritual-intro');
        const steps = document.getElementById('ritual-steps');

        desc.style.opacity = 0;
        title.style.opacity = 0;
        intro.style.opacity = 0;
        steps.style.opacity = 0;

        setTimeout(() => {
            desc.innerText = variantsData[variant].desc;
            title.innerText = variantsData[variant].ritualTitle;
            intro.innerText = variantsData[variant].ritualIntro;
            steps.innerHTML = variantsData[variant].ritualSteps;
            
            desc.style.opacity = 1;
            title.style.opacity = 1;
            intro.style.opacity = 1;
            steps.style.opacity = 1;
        }, 300);
    }

    document.addEventListener("DOMContentLoaded", function() {
        // 綁定按鈕
        document.querySelectorAll('.variant-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                setVariant(this.getAttribute('data-type'));
            });
        });

        // 參數接收
        const urlParams = new URLSearchParams(window.location.search);
        const requestedVariant = urlParams.get('v');
        if(requestedVariant) setVariant(requestedVariant);
    });
</script>
</body>
</html>
