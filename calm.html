<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🜁 靜域之心｜靈魂旅人 Soul Traveler</title>
    <style>
        :root { 
            --bg-color: #050A14; 
            --text-main: #EAEAEA; 
            --text-muted: #888899; 
            --gold-accent: #DCA750; 
            --border-color: #1E3050; 
            --nav-bg: rgba(5, 10, 20, 0.9); 
            --theme-color: #64B5F6; 
            --ease-out: cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        html { scroll-behavior: smooth; }
        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: "PingFang TC", "STHeiti", sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; 
            background-image: radial-gradient(circle at 50% 0%, #0d1a33 0%, #050A14 70%); 
        }

        /* --- Navigation --- */
        .smart-nav { 
            position: fixed; top: 0; width: 100%; height: 75px; 
            background: var(--nav-bg); backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(220, 167, 80, 0.15); 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 50px; box-sizing: border-box; z-index: 1000; 
        }
        .smart-nav .brand-logo { color: var(--gold-accent); font-size: 1.2em; letter-spacing: 4px; font-weight: 300; text-decoration: none; }
        .nav-links { display: flex; gap: 35px; }
        .nav-links a { color: var(--text-main); text-decoration: none; font-size: 0.9em; letter-spacing: 1px; transition: 0.3s; opacity: 0.8; }
        .nav-links a:hover { opacity: 1; color: var(--gold-accent); }

        /* --- Hero Section --- */
        .product-hero { 
            display: flex; min-height: 100vh; padding: 150px 50px 100px; 
            max-width: 1200px; margin: 0 auto; gap: 80px; 
        }
        @media (max-width: 900px) { .product-hero { flex-direction: column; align-items: center; text-align: center; } }

        .product-visual { 
            flex: 1.2; position: sticky; top: 150px; height: 600px; 
            border-radius: 24px; background: rgba(255, 255, 255, 0.02); 
            border: 1px solid rgba(100, 181, 246, 0.2); 
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            transition: 0.6s var(--ease-out);
        }
        .product-visual:hover { border-color: var(--theme-color); transform: translateY(-10px); }

        .product-info { flex: 1; }
        
        /* 適合需要 */
        .axis-badge { 
            display: inline-block; padding: 6px 20px; border: 1px solid var(--theme-color); 
            color: var(--theme-color); border-radius: 30px; font-size: 0.85em; 
            margin-bottom: 25px; letter-spacing: 2px; background: rgba(100, 181, 246, 0.05);
        }

        .product-title { font-size: 3.2em; font-weight: 300; margin: 0 0 20px 0; letter-spacing: 5px; }
        .core-quote { font-size: 1.1em; color: var(--gold-accent); margin-bottom: 40px; line-height: 1.8; font-weight: 300; }

        /* 能量主題 */
        .energy-theme { 
            font-size: 0.9em; color: var(--text-muted); letter-spacing: 2px; 
            margin-bottom: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; 
        }

        /* 狀態覺察 */
        .diagnosis-box { 
            background: rgba(100, 181, 246, 0.03); border-left: 3px solid var(--theme-color); 
            padding: 25px; margin-bottom: 40px; text-align: left; 
        }
        .diagnosis-box h5 { margin: 0 0 15px 0; color: var(--theme-color); font-size: 1em; letter-spacing: 2px; }
        .diagnosis-box p { margin: 0; font-size: 0.95em; line-height: 1.8; color: #ccc; }

        /* 適合時刻 */
        .usage-moments { margin-bottom: 50px; text-align: left; }
        .usage-moments h5 { color: var(--gold-accent); font-size: 0.9em; margin-bottom: 20px; letter-spacing: 2px; }
        .moment-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .moment-item { font-size: 0.85em; color: var(--text-muted); display: flex; align-items: center; gap: 10px; }
        .moment-item::before { content: "✦"; color: var(--gold-accent); font-size: 0.7em; }

        /* 版本切換 */
        .variant-group { border-top: 1px solid var(--border-color); padding-top: 40px; text-align: left; }
        .variants { display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0; }
        .variant-btn { 
            background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); 
            padding: 12px 24px; border-radius: 10px; cursor: pointer; transition: 0.3s; 
        }
        .variant-btn.active { border-color: var(--theme-color); color: var(--text-main); background: rgba(100, 181, 246, 0.1); }

        /* --- Details --- */
        .detail-section { max-width: 1000px; margin: 0 auto 100px; padding: 0 40px; }
        .detail-card { margin-bottom: 100px; }
        .detail-card h3 { 
            color: var(--gold-accent); font-weight: 300; letter-spacing: 6px; 
            border-bottom: 1px solid rgba(220,167,80,0.1); padding-bottom: 20px; 
            margin-bottom: 50px; text-align: center; 
        }
        .track-list { display: flex; flex-direction: column; gap: 35px; max-width: 800px; margin: 0 auto; }
        .track-item { display: flex; gap: 50px; align-items: flex-start; }
        .track-label { color: var(--theme-color); font-size: 0.85em; width: 100px; flex-shrink: 0; letter-spacing: 3px; font-weight: bold; }

        footer { border-top: 1px solid var(--border-color); padding: 80px; text-align: center; color: var(--text-muted); font-size: 0.8em; letter-spacing: 3px; }
    </style>
</head>
<body>

<nav class="smart-nav">
    <a href="index.html" class="brand-logo">SOUL TRAVELER</a>
    <div class="nav-links">
        <a href="index.html">首頁</a>
        <a href="about.html">關於品牌</a>
        <a href="philosophy.html">品牌哲學</a>
        <a href="test.html">Find Your State</a>
        <a href="state.html">狀態</a>
    </div>
</nav>

<section class="product-hero">
    <div class="product-visual">
        <div style="color: var(--theme-color); letter-spacing: 2px;">視覺圖佔位</div>
    </div>

    <div class="product-info">
        <div id="dynamic-need" class="axis-badge"></div>
        <h1 class="product-title">🜁 靜域之心</h1>
        <div class="core-quote">「靜域之心不是讓世界變安靜，而是在喧囂之中建立屬於自己的安靜空間。」</div>
        
        <div id="dynamic-theme" class="energy-theme"></div>

        <div id="dynamic-diagnosis" class="diagnosis-box"></div>

        <div class="usage-moments">
            <h5>✦ 適合使用時刻 ✦</h5>
            <div class="moment-grid">
                <div class="moment-item">深度冥想靜心時</div>
                <div class="moment-item">感到焦慮不安時</div>
                <div class="moment-item">需要建立結界時</div>
                <div class="moment-item">思緒過載混亂時</div>
            </div>
        </div>

        <div class="variant-group">
            <div style="font-size: 0.9em; color: var(--text-muted);">選擇專屬配方版本：</div>
            <div class="variants">
                <button class="variant-btn active" data-type="standard">標準穩心版</button>
                <button class="variant-btn" data-type="pet">毛孩安心版</button>
                <button class="variant-btn" data-type="baby">寶寶安睡版</button>
                <button class="variant-btn" data-type="pregnant">孕媽咪支撐版</button>
            </div>
            <p id="dynamic-desc" style="margin-top: 25px; font-size: 1em; color: var(--theme-color); line-height: 1.6;"></p>
        </div>
    </div>
</section>

<div class="detail-section">
    <div class="detail-card">
        <h3>✦ 氣味場景 ✦</h3>
        <p id="dynamic-scene" style="line-height: 2.5; letter-spacing: 2px; color: #ccc; text-align: center; max-width: 800px; margin: 0 auto;"></p>
    </div>

    <div class="detail-card">
        <h3>✦ 香氣軌跡 ✦</h3>
        <div id="dynamic-tracks" class="track-list"></div>
    </div>

    <div class="detail-card">
        <h3>✦ 全成分標示 ✦</h3>
        <p id="dynamic-ingredients" style="font-size: 1em; color: var(--text-muted); text-align: center; letter-spacing: 1px;"></p>
        <p id="dynamic-safety" style="margin-top: 30px; color: var(--theme-color); font-size: 0.85em; text-align: center; letter-spacing: 2px;"></p>
    </div>
</div>

<footer>&copy; 2026 SOUL TRAVELER</footer>

<script>
const variants = {
    standard: {
        need: "適合需要：放鬆 ‧ 回到中心 ‧ 冥想",
        theme: "✦ 能量主題｜內在安定 ‧ 結界防護 ‧ 思緒沉靜",
        desc: "【深度冥想、思緒清理】為太容易共感的你，建立堅實的心理空間。",
        diag: "<h5>✦ 狀態覺察 ✦</h5><p>當下狀態：焦躁、情緒起伏大、容易被外界的聲音或他人的情緒干擾。<br>內在需求：渴望一個沒有雜訊、安全且獨立的心理邊界。</p>",
        scene: "當你閉上眼睛，世界的一切喧囂瞬間被隔絕在外。這裡像是一座深海裡的純白房間，沒有雜訊，沒有他人情緒的拉扯，只有你穩定的心跳聲。在這個絕對真空的靜域裡，你終於可以把心安放下來，聽見自己最真實的聲音。",
        tracks: `
            <div class="track-item"><div class="track-label">TOP</div><div>佛手柑、苦橙葉：【思緒梳理】瞬間切斷外界雜訊干擾，讓過載的思緒冷卻。</div></div>
            <div class="track-item"><div class="track-label">MIDDLE</div><div>薰衣草、花梨木：【溫柔支撐】針對太容易共感而疲憊的內在，給予溫柔而堅定的支撐。</div></div>
            <div class="track-item"><div class="track-label">BASE</div><div>岩蘭草、乳香：【大地定錨】透過深沉的絲滑煙燻與泥土氣味，將意識重新定錨。</div></div>`,
        ingredients: "佛手柑、苦橙葉、高地薰衣草、花梨木、岩蘭草、乳香、95% 植萃香水酒精。",
        safety: "✦ 穩心配方：本配方能量平穩收斂，適合日常靜心與空間結界使用。"
    },
    pet: {
        need: "適合需要：人寵共安 ‧ 環境降噪 ‧ 穩定共振",
        theme: "✦ 能量主題｜跨物種撫慰 ‧ 頻率調整 ‧ 溫和防護",
        desc: "【溫和頻率】調整共振頻率，安撫毛孩的焦躁，建立人寵共生的靜謐空間。",
        diag: "<h5>✦ 狀態覺察 ✦</h5><p>當下狀態：毛孩表現出不安、焦慮；你也感到環境頻率混亂。<br>內在需求：需要讓不同物種的靈魂同時獲得安全感的穩定能量。</p>",
        scene: "氣味分子與空間輕柔共振，建立起一座人寵共生的靜謐島嶼。讓焦躁的能量轉化為平穩的深呼吸，讓愛與平靜在氣味中無聲傳遞。",
        tracks: `
            <div class="track-item"><div class="track-label">TOP</div><div>波旁天竺葵：【頻率降噪】以溫和的草本能量平撫環境中的躁動音訊。</div></div>
            <div class="track-item"><div class="track-label">MIDDLE</div><div>薰衣草、花梨木：【平衡神經】調整人與寵物之間的共振，建立默契。</div></div>
            <div class="track-item"><div class="track-label">BASE</div><div>乳香、岩蘭草：【純淨守護】在不刺激嗅覺的前提下，建立深層安全感。</div></div>`,
        ingredients: "波旁天竺葵、高地薰衣草、花梨木、乳香、岩蘭草、專用低敏擴散載體。",
        safety: "✦ 寵物友善：嚴格剔除對犬貓肝臟有負擔之成分，配方溫和。"
    },
    baby: {
        need: "適合需要：安穩入眠 ‧ 感知保護 ‧ 溫柔包覆",
        theme: "✦ 能量主題｜過濾雜訊 ‧ 夜間修護 ‧ 純淨守護",
        desc: "【過濾雜訊】以極致溫和的頻率過濾環境雜訊，溫柔包覆夜間敏銳的感知。",
        diag: "<h5>✦ 狀態覺察 ✦</h5><p>當下狀態：寶寶夜驚、睡不安穩、對環境變動過於敏銳。<br>內在需求：如同母親懷抱般、隔絕外界尖銳能量的溫柔保護層。</p>",
        scene: "想像寶寶躺在由香氣織成的柔軟雲朵上，外界所有的尖銳聲音都被過濾成溫和的頻率。在這裡，沒有惡夢，只有無窮的平靜與深深的睡眠。",
        tracks: `
            <div class="track-item"><div class="track-label">TOP</div><div>甜橙、佛手柑：【快樂撫慰】輕輕掃去不安的情緒霧霾，帶來陽光。</div></div>
            <div class="track-item"><div class="track-label">MIDDLE</div><div>花梨木：【感知緩衝】在感知與環境間建立溫柔緩衝層。</div></div>
            <div class="track-item"><div class="track-label">BASE</div><div>狻猊複方（輕比例）：【深度安歇】引導神經系統進入全然休息。</div></div>`,
        ingredients: "甜橙、佛手柑、花梨木、薰衣草、極稀釋岩蘭草。",
        safety: "✦ 寶寶安睡：專為 6 個月以上幼兒設計，配方比例經極致稀釋優化。"
    },
    pregnant: {
        need: "適合需要：情緒穩固 ‧ 身體支撐 ‧ 能量定錨",
        theme: "✦ 能量主題｜大地連結 ‧ 壓力釋放 ‧ 雙心共振",
        desc: "【大地支撐】提供穩定厚實的大地能量，穩固孕期容易起伏的情緒。",
        diag: "<h5>✦ 狀態覺察 ✦</h5><p>當下狀態：孕期身體負荷重、情緒易感、睡眠淺且多夢。<br>內在需求：需要厚實的大地支撐，感受身體內外的穩固連結。</p>",
        scene: "這是一款為兩顆心跳設計的香氣。在氣息之中，你感受到大地深處傳來的支撐感，不僅放鬆了肩膀，也讓靈魂深處感到踏實與被愛。",
        tracks: `
            <div class="track-item"><div class="track-label">TOP</div><div>橙花、紅橘：【母性平撫】舒緩起伏的情緒，帶來溫暖。</div></div>
            <div class="track-item"><div class="track-label">MIDDLE</div><div>苦橙葉、花梨木：【身心韌性】增強支撐力，舒緩壓力與疲勞。</div></div>
            <div class="track-item"><div class="track-label">BASE</div><div>乳香、岩蘭草：【核心穩固】建立最強大的安全底盤。</div></div>`,
        ingredients: "橙花、紅橘、苦橙葉、佛手柑、高地薰衣草、花梨木、岩蘭草。",
        safety: "✦ 孕期支撐：配方溫和清爽，懷孕滿 3 個月後即可安心使用。"
    }
};

function update(v) {
    const d = variants[v];
    document.getElementById('dynamic-need').innerText = d.need;
    document.getElementById('dynamic-theme').innerText = d.theme;
    document.getElementById('dynamic-diagnosis').innerHTML = d.diag;
    document.getElementById('dynamic-desc').innerText = d.desc;
    document.getElementById('dynamic-scene').innerText = d.scene;
    document.getElementById('dynamic-tracks').innerHTML = d.tracks;
    document.getElementById('dynamic-ingredients').innerText = d.ingredients;
    document.getElementById('dynamic-safety').innerText = d.safety;

    document.querySelectorAll('.variant-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.type === v);
    });
}

document.querySelectorAll('.variant-btn').forEach(btn => {
    btn.addEventListener('click', () => update(btn.dataset.type));
});

update('standard');
</script>
</body>
</html>
