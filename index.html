<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈魂旅人 Soul Traveler｜陪伴你回到自己的狀態</title>
    <style>
        :root {
            --bg-color: #0A1428; 
            --bg-darker: #050A14;
            --text-main: #EAEAEA;
            --text-muted: #888899;
            --gold-accent: #DCA750; 
            --nav-bg: rgba(5, 10, 20, 0.85);
            --ease-out-cubic: cubic-bezier(0.215, 0.61, 0.355, 1);
        }

        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-darker); color: var(--text-main); font-family: "PingFang TC", "Helvetica Neue", sans-serif; margin: 0; padding: 0; overflow-x: hidden; background-image: radial-gradient(circle at 50% 30%, #162a52 0%, #050A14 80%); height: 100vh; display: flex; flex-direction: column;}

        /* 導覽列 */
        .smart-nav { position: fixed; top: 0; width: 100%; height: 70px; background: var(--nav-bg); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(220, 167, 80, 0.1); display: flex; justify-content: space-between; align-items: center; padding: 0 40px; box-sizing: border-box; z-index: 1000; transition: top 0.4s; }
        .smart-nav.nav-up { top: -80px; }
        .smart-nav .brand-logo { color: var(--gold-accent); font-size: 1.1em; letter-spacing: 3px; font-weight: 300; text-decoration: none; }
        .smart-nav .nav-links { display: flex; gap: 30px; align-items: center; }
        .smart-nav .nav-links a { color: var(--text-main); text-decoration: none; font-size: 0.9em; letter-spacing: 1px; transition: color 0.3s; }
        .smart-nav .nav-links a:hover { color: var(--gold-accent); }
        @media (max-width: 768px) { .smart-nav .nav-links a { display: none; } }

        .fade-in-element { opacity: 0; transform: translateY(30px); transition: opacity 1.5s var(--ease-out-cubic), transform 1.5s var(--ease-out-cubic); }
        .fade-in-element.visible { opacity: 1; transform: translateY(0); }

        /* 首頁核心視覺區 */
        .hero-section { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 20px; position: relative; z-index: 1;}
        .hero-title { font-size: 3em; color: var(--gold-accent); letter-spacing: 12px; font-weight: 300; margin-bottom: 40px; text-transform: uppercase;}
        
        /* ✦ 新增：品牌一句話 ✦ */
        .hero-quote { font-size: 1.3em; color: var(--text-main); line-height: 2.2; letter-spacing: 4px; font-weight: 300; margin-bottom: 60px; opacity: 0.9;}
        
        .btn-explore { padding: 15px 40px; border: 1px solid rgba(220,167,80,0.5); border-radius: 30px; color: var(--gold-accent); font-size: 1em; letter-spacing: 4px; text-decoration: none; transition: all 0.5s ease; background: rgba(220,167,80,0.05); font-weight: 300; text-transform: uppercase;}
        .btn-explore:hover { background: var(--gold-accent); color: var(--bg-darker); box-shadow: 0 5px 25px rgba(220,167,80,0.4); transform: translateY(-3px);}

        /* 宇宙塵背景 */
        .cosmic-dust { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 0; background-image: radial-gradient(1.5px 1.5px at 20px 30px, rgba(220,167,80,0.3), rgba(0,0,0,0)), radial-gradient(1px 1px at 80px 70px, rgba(255,255,255,0.2), rgba(0,0,0,0)); background-size: 200px 200px; animation: drift 60s linear infinite; opacity: 0.8; }
        @keyframes drift { from { transform: translateY(0); } to { transform: translateY(-200px); } }

        /* 工藝宣告與 Footer */
        .spec-note { text-align: center; font-size: 0.85em; color: var(--text-muted); background: rgba(0,0,0,0.4); padding: 20px; border-radius: 8px; max-width: 800px; margin: 0 auto 40px auto; letter-spacing: 2px; border: 1px solid rgba(220,167,80,0.1); position: relative; z-index: 1;}
        .site-footer { border-top: 1px solid rgba(220, 167, 80, 0.15); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; background: #030508; position: relative; z-index: 1;}
        .footer-links { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px;}
        .footer-links a { color: var(--text-muted); text-decoration: none; font-size: 0.85em; letter-spacing: 2px; transition: color 0.3s; font-weight: 300; text-transform: uppercase;}
        .footer-links a:hover { color: var(--gold-accent); }
        .footer-copyright { font-size: 0.75em; color: rgba(136, 136, 153, 0.5); letter-spacing: 2px;}
    </style>
</head>
<body>

<nav id="smart-nav" class="smart-nav">
    <a href="index.html" class="brand-logo">SOUL TRAVELER</a>
    <div class="nav-links">
        <a href="state.html">四種狀態</a>
        <a href="philosophy.html">品牌哲學</a>
        <a href="about.html">關於品牌</a>
    </div>
</nav>

<div class="cosmic-dust"></div>

<section class="hero-section">
    <h1 class="hero-title fade-in-element">Soul Traveler</h1>
    
    <p class="hero-quote fade-in-element" style="transition-delay: 0.3s;">
        香氣不是改變命運，<br>
        而是陪伴你回到自己的狀態。
    </p>

    <a href="state.html" class="btn-explore fade-in-element" style="transition-delay: 0.6s;">四種內在狀態</a>
</section>

<div class="spec-note fade-in-element" style="transition-delay: 0.9s;">
    ✦ 工藝堅持：以 <strong>95% 植萃香水酒精</strong> 為載體，不妥協的純粹，只為精準還原每一分狀態。
</div>

<footer class="site-footer fade-in-element" style="transition-delay: 1.2s;">
    <div class="footer-links">
        <a href="philosophy.html">Philosophy</a>
        <a href="state.html">States</a>
        <a href="about.html">About</a>
    </div>
    <div class="footer-copyright">
        &copy; 2026 Soul Traveler. All rights reserved.
    </div>
</footer>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        setTimeout(() => { document.querySelectorAll('.fade-in-element').forEach(el => { el.classList.add('visible'); }); }, 100);
    });
</script>
</body>
</html>
