<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>靈魂狀態測試｜Soul Traveler</title>
    <style>
        :root { --bg-color: #050A14; --text-main: #EAEAEA; --text-muted: #888899; --gold-accent: #DCA750; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: "PingFang TC", "Helvetica Neue", sans-serif; margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }

        .smart-nav { width: 100%; height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 40px; box-sizing: border-box; border-bottom: 1px solid rgba(220, 167, 80, 0.15); }
        .brand-logo { color: var(--gold-accent); font-size: 1.1em; letter-spacing: 3px; text-decoration: none; }
        .quiz-container { max-width: 500px; width: 90%; margin-top: 100px; text-align: center; }
        #progress-bg { width: 100%; height: 2px; background: rgba(255,255,255,0.1); margin-bottom: 40px; }
        #bar { width: 0%; height: 100%; background: var(--gold-accent); transition: width 0.5s ease; }

        .question { font-size: 1.5em; font-weight: 300; letter-spacing: 2px; margin-bottom: 40px; }
        .option-btn { display: block; width: 100%; padding: 18px; margin: 15px 0; background: transparent; border: 1px solid rgba(220,167,80,0.2); color: var(--text-main); cursor: pointer; transition: all 0.3s; font-size: 1em; letter-spacing: 1px; border-radius: 8px; }
        .option-btn:hover { border-color: var(--gold-accent); background: rgba(220,167,80,0.05); }

        /* 升級後的香氛卡視覺 */
        #result-area { display: none; margin-top: 50px; }
        .scent-card { border: 1px solid var(--gold-accent); padding: 50px 30px; border-radius: 2px; max-width: 300px; margin: 0 auto 30px auto; background: rgba(220, 167, 80, 0.03); }
        .card-header { font-size: 0.7em; letter-spacing: 6px; margin-bottom: 30px; opacity: 0.7; }
        .card-title { font-size: 1.8em; letter-spacing: 8px; color: var(--gold-accent); margin-bottom: 30px; }
        .card-content { font-size: 1em; line-height: 2.2; color: var(--text-main); letter-spacing: 2px; font-weight: 300; }
        
        .recommend-box { margin-top: 40px; }
        .recommend-label { color: var(--text-muted); font-size: 0.75em; letter-spacing: 3px; margin-bottom: 10px; text-transform: uppercase; }
        .explore-btn { color: var(--gold-accent); text-decoration: none; border-bottom: 1px solid var(--gold-accent); padding-bottom: 5px; font-size: 1.1em; letter-spacing: 2px; }
    </style>
</head>
<body>

<nav class="smart-nav">
    <a href="index.html" class="brand-logo">SOUL TRAVELER</a>
</nav>

<div class="quiz-container">
    <div id="progress-bg"><div id="bar"></div></div>
    
    <div id="quiz-box">
        <div class="question" id="question-text">載入中...</div>
        <div id="options-area"></div>
    </div>

    <div id="result-area"></div>
</div>

<script>
    const questions = [
        { q: "最近的你比較像：", options: ["需要安靜下來", "想重新點燃動力", "想回到自然與自己", "想打開機會與流動"], map: ['calm', 'fire', 'forest', 'wealth'] },
        { q: "如果有一種空間，你會選：", options: ["安靜的房間", "充滿火光的地方", "森林", "充滿機會的城市"], map: ['calm', 'fire', 'forest', 'wealth'] },
        { q: "你現在最需要的是：", options: ["平靜", "力量", "安定", "流動"], map: ['calm', 'fire', 'forest', 'wealth'] },
        { q: "如果是一種元素：", options: ["風", "火", "木", "金"], map: ['calm', 'fire', 'forest', 'wealth'] },
        { q: "結束漫長的一天，你最想：", options: ["窩在沙發發呆", "運動釋放壓力", "閱讀與伸展", "規劃明天行程"], map: ['calm', 'fire', 'forest', 'wealth'] }
    ];

    let scores = { calm: 0, fire: 0, forest: 0, wealth: 0 };
    let currentQ = 0;

    function renderQuestion() {
        if(currentQ >= questions.length) return showResult();
        document.getElementById("bar").style.width = (currentQ / questions.length) * 100 + "%";
        document.getElementById('question-text').innerText = questions[currentQ].q;
        const area = document.getElementById('options-area');
        area.innerHTML = '';
        questions[currentQ].options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => { scores[questions[currentQ].map[idx]]++; currentQ++; renderQuestion(); };
            area.appendChild(btn);
        });
    }

    function showResult() {
        // (2) 進度條滿格
        document.getElementById("bar").style.width = "100%";
        document.getElementById('quiz-box').style.display = 'none';
        
        let maxScore = Math.max(...Object.values(scores));
        let winners = Object.keys(scores).filter(key => scores[key] === maxScore);
        const winner = winners[Math.floor(Math.random() * winners.length)];

        const mapping = {
            calm: { state: "CALM", desc: "You are seeking stillness and clarity.<br>A quiet scent may help you return to your center.", title: "靜域之心", link: "calm.html" },
            fire: { state: "FIRE", desc: "Your inner flame is ready to rise.<br>This scent awakens movement and courage.", title: "回火之心", link: "fire.html" },
            forest: { state: "FOREST", desc: "You are seeking deeper roots.<br>This scent connects you to the earth.", title: "靜息之森", link: "forest.html" },
            wealth: { state: "WEALTH", desc: "Your focus is becoming sharp.<br>This scent aligns your energy with purpose.", title: "聚財之眼", link: "wealth.html" }
        };

        const res = mapping[winner];
        // (1) 調整為香氛卡視覺 + (3) 加入 Recommended scent 引導語
        document.getElementById('result-area').innerHTML = `
            <div class="scent-card">
                <div class="card-header">SOUL STATE</div>
                <div class="card-title">${res.state}</div>
                <div class="card-content">${res.desc}</div>
            </div>
            <div class="recommend-box">
                <div class="recommend-label">Recommended scent</div>
                <h3 style="color: var(--gold-accent); letter-spacing: 3px; font-weight: 300;">${res.title}</h3>
                <a href="${res.link}" class="explore-btn">Explore ${res.title} →</a>
            </div>
        `;
        document.getElementById('result-area').style.display = 'block';
    }

    renderQuestion();
</script>
</body>
</html>
